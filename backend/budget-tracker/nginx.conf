# /etc/nginx/sites-available/spending-portfolio
#
# Replace YOUR_DOMAIN below with your actual domain (e.g. souravmondal.dev)
# After running certbot, the SSL cert paths below are populated automatically.

# Rate limiting zone (must be defined in the http {} block in /etc/nginx/nginx.conf)
# Add this line inside the http block of /etc/nginx/nginx.conf:
#   limit_req_zone $binary_remote_addr zone=api_limit:10m rate=2r/s;

# ── Block 1: HTTP → HTTPS redirect ──────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;
    return 301 https://$host$request_uri;
}

# ── Block 2: HTTPS (main) ────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # SSL certificates — populated by Certbot (run: certbot --nginx -d YOUR_DOMAIN)
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    server_tokens off;

    # ── Security headers ─────────────────────────────────────────────────────
    # Tell browsers to only use HTTPS for 2 years; submit to preload list when live
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Prevent this page from being embedded in iframes (clickjacking protection)
    add_header X-Frame-Options           "DENY"                            always;

    # Prevent MIME-type sniffing
    add_header X-Content-Type-Options    "nosniff"                         always;

    # Only send origin (no path/query) as Referer on cross-origin navigation
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # CSP: Vite builds need unsafe-inline for scripts/styles; Groq is server-side only
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;

    # ── Static frontend (React build) ────────────────────────────────────────
    root /var/www/spending-portfolio;
    index index.html;

    # SPA routing — fall through to index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, max-age=3600";
    }

    # Long cache for hashed assets
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── API reverse-proxy ─────────────────────────────────────────────────────
    location /api/ {
        # Rate-limit: 2 requests/sec per IP, allow burst of 5
        limit_req zone=api_limit burst=5 nodelay;
        limit_req_status 429;

        # Hard upload size cap — second line of defence after FastAPI's check
        client_max_body_size 16M;

        # Strip /api prefix when forwarding
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Forward the consent header from browser to FastAPI
        proxy_pass_header X-Consent-Given;

        # Long timeouts — pipeline can take 60–120s
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_connect_timeout 30s;

        # Disable buffering for streamed responses
        proxy_buffering off;
    }
}
