# /etc/nginx/sites-available/spending-portfolio
#
# Replace YOUR_DOMAIN below with your actual domain (e.g. souravmondal.dev)
# After running certbot, this file gets auto-edited to add SSL config.

# Rate limiting zone (must be defined in the http {} block, e.g. /etc/nginx/nginx.conf)
# Add this line near the top of /etc/nginx/nginx.conf inside the http block:
#   limit_req_zone $binary_remote_addr zone=api_limit:10m rate=2r/s;

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # Will be replaced by certbot with HTTPS redirect
    # return 301 https://$host$request_uri;

    # ── Static frontend (React build) ───────────────────────────────────────
    root /var/www/spending-portfolio;
    index index.html;

    # SPA routing — fall through to index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, max-age=3600";
    }

    # Long cache for hashed assets
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── API reverse-proxy ───────────────────────────────────────────────────
    location /api/ {
        # Rate-limit: 2 requests/sec per IP, allow burst of 5
        limit_req zone=api_limit burst=5 nodelay;
        limit_req_status 429;

        # Hard upload size cap — second line of defence after FastAPI's check
        client_max_body_size 16M;

        # Strip /api prefix when forwarding
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeouts — pipeline can take 60–120s
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_connect_timeout 30s;

        # Disable buffering for streamed responses
        proxy_buffering off;
    }

    # Hide nginx version from response headers
    server_tokens off;
}
